services:
  cx-algobot:
    build: .
    container_name: cx-algobot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env to the external or local PostgreSQL SQLAlchemy URL}
      MARKET_DATA_CACHE_DIR: /data/market_data_cache
    command:
      - sh
      - -c
      - |
        case "$${DATABASE_URL}" in
          postgresql*) ;;
          *) echo "Compose deployment requires a PostgreSQL DATABASE_URL"; exit 1 ;;
        esac
        alembic upgrade head
        exec python -m uvicorn app.main:app --host 0.0.0.0 --port 8011
    ports:
      - "8011:8011"
    volumes:
      - cx_algobot_data:/data
      - cx_algobot_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8011/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
  postgres:
    image: postgres:16-alpine
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: algobot
      POSTGRES_USER: algobot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algobot-paper-only}
    volumes:
      - cx_algobot_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algobot -d algobot"]
      interval: 10s
      timeout: 5s
      retries: 10

  cx-algobot-backup:
    image: ${PG_DUMP_IMAGE:-postgres:17-alpine}
    container_name: cx-algobot-backup
    profiles: ["backup"]
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      POSTGRES_BACKUP_URL: ${POSTGRES_BACKUP_URL:-}
    command: >
      sh -c "while true; do
      if [ -z \"$${POSTGRES_BACKUP_URL}\" ]; then
      echo 'POSTGRES_BACKUP_URL is required for backups';
      sleep 3600;
      continue;
      fi;
      ts=$$(date -u +%Y%m%dT%H%M%SZ);
      pg_dump \"$${POSTGRES_BACKUP_URL}\" -Fc -f /backups/algobot_$${ts}.dump;
      find /backups -name 'algobot_*.dump' -mtime +14 -delete;
      sleep 86400;
      done"

  offsite-backup:
    image: rclone/rclone:latest
    profiles: ["offsite-backup"]
    restart: unless-stopped
    volumes:
      - ./backups:/backups:ro
      - ${RCLONE_CONFIG_PATH:-./rclone.conf}:/config/rclone/rclone.conf:ro
    environment:
      OFFSITE_BACKUP_REMOTE: ${OFFSITE_BACKUP_REMOTE:-remote:cx-algobot-backups}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      while true; do
      rclone sync /backups "$${OFFSITE_BACKUP_REMOTE}";
      sleep 86400;
      done

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - cx_algobot_prometheus:/prometheus

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - cx_algobot_grafana:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  cx_algobot_data:
  cx_algobot_logs:
  cx_algobot_postgres:
  cx_algobot_prometheus:
  cx_algobot_grafana:
